<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WeChat Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="icon.png" alt="" class="brand-icon">
      <span class="brand-text">WeChat Viewer</span>
    </div>

    <div class="sidebar-actions">
      <button class="btn btn-primary" id="decrypt-btn" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>一键解密</span>
      </button>
      <button class="btn btn-ghost" id="folder-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>选择目录</span>
      </button>
    </div>

    <div class="search-wrapper">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="搜索会话...">
    </div>

    <div class="conv-list" id="conv-list">
      <div class="empty-state" id="conv-empty">
        <p>检测中...</p>
      </div>
    </div>

    <div class="sidebar-footer" id="sidebar-footer"></div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <header class="chat-header" id="chat-header">
      <div class="chat-title-row">
        <h2 class="chat-title" id="chat-title"></h2>
        <span class="chat-badge" id="chat-badge"></span>
      </div>
      <div class="toolbar" id="toolbar" style="display:none">
        <div class="date-range">
          <label>从</label>
          <input type="date" id="date-start" value="2020-01-01">
          <label>至</label>
          <input type="date" id="date-end">
          <button class="btn btn-sm" id="filter-btn">筛选</button>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-sm btn-accent" id="export-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            导出 CSV
          </button>
          <button class="btn btn-sm" id="export-all-btn">全部导出</button>
        </div>
      </div>
    </header>

    <div class="messages-area" id="messages-area">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <img src="icon.png" alt="" width="80" height="80" style="border-radius:20px;opacity:0.8">
        </div>
        <h2>WeChat Chat Viewer</h2>
        <p id="welcome-text">正在检测微信数据...</p>
      </div>
    </div>

    <div class="pagination" id="pagination" style="display:none">
      <button class="btn btn-sm" id="prev-btn" disabled>上一页</button>
      <span class="page-info" id="page-info"></span>
      <button class="btn btn-sm" id="next-btn" disabled>下一页</button>
    </div>
  </main>
</div>

<!-- Decrypt modal -->
<div class="modal-overlay" id="decrypt-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>解密数据库</h3>
      <button class="modal-close" id="decrypt-modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="decrypt-accounts" id="decrypt-accounts"></div>
      <div class="decrypt-progress" id="decrypt-progress" style="display:none">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <p class="progress-text" id="progress-text">准备中...</p>
      </div>
    </div>
  </div>
</div>

<div class="status-bar" id="status-bar">就绪</div>

<script src="app.js"></script>
</body>
</html>
